<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF6EC">
  <title>Paideia — Art</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="method-page">
  <a href="index.html" class="home-link">← Home</a>

  <main id="root" class="method-main"></main>

  <script src="assets/arts-data.js"></script>
  <script src="assets/app.js"></script>
  <script>
    const SUB_ICONS = {
      'what-it-is': '<circle cx="32" cy="32" r="22" fill="none" stroke="currentColor" stroke-width="4"/><polygon points="32,16 38,32 32,48 26,32" fill="currentColor"/>',
      'the-path': '<path d="M12 50 Q 20 30 32 30 Q 44 30 52 14" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/><circle cx="12" cy="50" r="4" fill="currentColor"/><circle cx="32" cy="30" r="4" fill="currentColor"/><circle cx="52" cy="14" r="4" fill="currentColor"/>',
      'practice': '<path d="M20 36 V22 a3 3 0 0 1 6 0 V32 V18 a3 3 0 0 1 6 0 V32 V20 a3 3 0 0 1 6 0 V34 V24 a3 3 0 0 1 6 0 V42 a14 14 0 0 1 -14 14 H26 a8 8 0 0 1 -8 -8 V40 a4 4 0 0 1 2 -4 Z" fill="currentColor"/>',
      'reading': '<rect x="14" y="14" width="36" height="40" rx="2" fill="currentColor"/><rect x="16" y="16" width="32" height="36" rx="1" fill="white"/><line x1="22" y1="24" x2="42" y2="24" stroke="currentColor" stroke-width="2.5"/><line x1="22" y1="32" x2="42" y2="32" stroke="currentColor" stroke-width="2.5"/><line x1="22" y1="40" x2="36" y2="40" stroke="currentColor" stroke-width="2.5"/>',
      'masters': '<polygon points="32,8 38,26 56,26 42,38 48,56 32,46 16,56 22,38 8,26 26,26" fill="currentColor"/>'
    };

    const SECTION_ORDER = ['what-it-is', 'the-path', 'practice', 'reading', 'masters'];

    const SUB_TITLES = {
      'what-it-is': 'What it is',
      'the-path': 'The path',
      'practice': 'Practice',
      'reading': 'Reading',
      'masters': 'Masters'
    };
    const SUB_TAGS = {
      'what-it-is': 'Definition, history, the why',
      'the-path': 'Beginner → intermediate → advanced',
      'practice': 'Concrete exercises and habits',
      'reading': 'Primary sources & modern guides',
      'masters': 'The great figures of this art'
    };

    const id = new URLSearchParams(location.search).get('id') || 'foundation';
    const a = window.ART_BY_ID(id);
    const root = document.getElementById('root');

    if (!a) {
      root.innerHTML = '<h1>Not found</h1><p><a href="index.html">← Home</a></p>';
    } else {
      document.title = 'Paideia — ' + a.name;
      document.documentElement.style.setProperty('--m-color', a.color);
      document.documentElement.style.setProperty('--m-deep', a.colorDeep);
      document.documentElement.style.setProperty('--m-soft', a.colorSoft);

      const sub = new URLSearchParams(location.search).get('s');
      if (sub && a.sections && a.sections[sub]) {
        renderSubSection(a, sub);
      } else {
        renderArtLanding(a);
      }
    }

    function renderArtLanding(a) {
      const subTiles = SECTION_ORDER.map(key => {
        const s = a.sections && a.sections[key];
        const built = !!s;
        return `
          <a class="sub-tile ${built ? '' : 'sub-tile-stub'}" ${built ? `href="art.html?id=${a.id}&s=${key}"` : ''}>
            ${built ? '' : '<span class="tile-badge">Coming soon</span>'}
            <div class="sub-tile-icon"><svg viewBox="0 0 64 64">${SUB_ICONS[key]}</svg></div>
            <div class="sub-tile-name">${SUB_TITLES[key]}</div>
            <div class="sub-tile-tag">${SUB_TAGS[key]}</div>
          </a>
        `;
      }).join('');

      root.innerHTML = `
        <header class="method-hero">
          <div class="method-hero-eyebrow">${a.group}</div>
          <h1>${a.name}</h1>
          <p class="method-tagline">${a.tagline}</p>
          <p class="method-blurb">${a.blurb}</p>
        </header>

        <section class="sub-tile-section">
          <h2>Explore</h2>
          <div class="sub-tile-grid">${subTiles}</div>
        </section>
      `;
    }

    function renderSubSection(a, key) {
      const s = a.sections[key];
      const back = `<div class="sub-back"><a href="art.html?id=${a.id}">← Back to ${a.name}</a></div>`;
      let body = '';

      if (key === 'what-it-is') {
        body = `
          <p class="lede">${s.intro}</p>
          ${s.principles.map((p, i) => `
            <div class="card principle-card">
              <div class="principle-num">${i + 1}</div>
              <h3>${p.name}</h3>
              <p>${p.body}</p>
              <p class="why">${p.why}</p>
            </div>
          `).join('')}
        `;
      } else if (key === 'the-path') {
        body = `
          <p class="lede">${s.intro}</p>
          ${s.levels.map(level => `
            <div class="card stage-card">
              <h3>${level.stage}</h3>
              <ul>${level.items.map(i => `<li>${i}</li>`).join('')}</ul>
            </div>
          `).join('')}
        `;
      } else if (key === 'practice') {
        body = `
          <p class="lede">${s.intro}</p>
          <div class="activity-grid">
            ${s.items.map((item, i) => `
              <div class="activity-card">
                <div class="activity-num">${i + 1}</div>
                <div class="activity-name">${item.name}</div>
                <div class="activity-body">${item.body}</div>
              </div>
            `).join('')}
          </div>
        `;
      } else if (key === 'reading') {
        body = `
          <p class="lede">${s.intro}</p>
          <div class="card">
            <ul class="book-list">
              ${s.books.map(b => `
                <li><strong>${b.title}</strong> — ${b.author}<br><span class="book-note">${b.note}</span></li>
              `).join('')}
            </ul>
          </div>
        `;
      } else if (key === 'masters') {
        body = `
          <p class="lede">${s.intro}</p>
          ${s.figures.map(f => `
            <div class="card">
              <h3>${f.name}</h3>
              <p>${f.what}</p>
            </div>
          `).join('')}
        `;
      }

      root.innerHTML = `
        ${back}
        <header class="sub-hero">
          <div class="sub-hero-eyebrow">${a.name}</div>
          <h1>${SUB_TITLES[key]}</h1>
          <button class="read-btn" id="sub-read-btn">▶ Read aloud</button>
        </header>
        ${body}
      `;
      window.scrollTo(0, 0);
      const readBtn = document.getElementById('sub-read-btn');
      if (readBtn) {
        readBtn.addEventListener('click', () => {
          if (window.Reader.speaking) window.Reader.stop();
          else window.Reader.readElement(document.getElementById('root'));
        });
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
  <script src="assets/reader.js"></script>
</body>
</html>
