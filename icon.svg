<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5FB1DD"/>
      <stop offset="1" stop-color="#3F8FCB"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.42" cy="0.38" r="0.7">
      <stop offset="0"    stop-color="#FFE57A"/>
      <stop offset="0.55" stop-color="#FFCE3D"/>
      <stop offset="1"    stop-color="#F0A815"/>
    </radialGradient>
    <filter id="softshadow" x="-10%" y="-10%" width="120%" height="125%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#sky)"/>
  <g stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round">
    <!-- Acroterion (decorative peak at top of pediment) -->
    <circle cx="256" cy="92" r="14" fill="url(#sun)"/>
    <!-- Pediment (triangle) -->
    <polygon points="256,108 80,236 432,236" fill="url(#sun)"/>
    <!-- Entablature -->
    <rect x="80" y="236" width="352" height="36" fill="url(#sun)"/>
    <!-- Four columns -->
    <rect x="104" y="272" width="48" height="148" fill="url(#sun)"/>
    <rect x="192" y="272" width="48" height="148" fill="url(#sun)"/>
    <rect x="280" y="272" width="48" height="148" fill="url(#sun)"/>
    <rect x="368" y="272" width="48" height="148" fill="url(#sun)"/>
    <!-- Stepped base -->
    <rect x="80" y="420" width="352" height="18" fill="url(#sun)"/>
    <rect x="64" y="438" width="384" height="22" fill="url(#sun)"/>
  </g>
</svg>