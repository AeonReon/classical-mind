<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF6D9"/>
      <stop offset="100%" stop-color="#FFD64A"/>
    </linearGradient>
    <linearGradient id="col" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF6EC"/>
      <stop offset="100%" stop-color="#E6D6A8"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF9F3D"/>
      <stop offset="100%" stop-color="#FF5E8E"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Rising sun behind -->
  <circle cx="256" cy="380" r="170" fill="url(#sun)" opacity="0.85"/>

  <!-- Ionic column - simplified -->
  <!-- Capital (top scroll) -->
  <rect x="148" y="120" width="216" height="22" fill="url(#col)"/>
  <circle cx="178" cy="142" r="14" fill="url(#col)"/>
  <circle cx="334" cy="142" r="14" fill="url(#col)"/>
  <rect x="160" y="138" width="192" height="16" fill="url(#col)"/>

  <!-- Shaft -->
  <rect x="176" y="154" width="160" height="248" fill="url(#col)"/>
  <!-- Fluting -->
  <g stroke="#C9B984" stroke-width="2" opacity="0.7">
    <line x1="190" y1="156" x2="190" y2="400"/>
    <line x1="206" y1="156" x2="206" y2="400"/>
    <line x1="222" y1="156" x2="222" y2="400"/>
    <line x1="238" y1="156" x2="238" y2="400"/>
    <line x1="254" y1="156" x2="254" y2="400"/>
    <line x1="270" y1="156" x2="270" y2="400"/>
    <line x1="286" y1="156" x2="286" y2="400"/>
    <line x1="302" y1="156" x2="302" y2="400"/>
    <line x1="318" y1="156" x2="318" y2="400"/>
  </g>

  <!-- Base -->
  <rect x="160" y="402" width="192" height="14" fill="url(#col)"/>
  <rect x="148" y="416" width="216" height="20" fill="url(#col)"/>

  <!-- Ground line -->
  <rect x="60" y="436" width="392" height="6" fill="#7c2d12" opacity="0.4"/>

  <!-- Two laurel branches at the base -->
  <g fill="#65a30d" opacity="0.85">
    <ellipse cx="100" cy="430" rx="20" ry="6" transform="rotate(-15 100 430)"/>
    <ellipse cx="110" cy="418" rx="18" ry="5" transform="rotate(-10 110 418)"/>
    <ellipse cx="412" cy="430" rx="20" ry="6" transform="rotate(15 412 430)"/>
    <ellipse cx="402" cy="418" rx="18" ry="5" transform="rotate(10 402 418)"/>
  </g>
</svg>
