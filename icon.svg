<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm cream background -->
  <rect width="512" height="512" rx="112" fill="#FAF6EC"/>

  <!-- Acroterion (decorative peak at top of pediment) -->
  <circle cx="256" cy="52" r="14" fill="#7F1D1D"/>

  <!-- Pediment (triangle) -->
  <polygon points="256,68 56,212 456,212" fill="#7F1D1D"/>

  <!-- Entablature (horizontal beam under pediment) -->
  <rect x="56" y="212" width="400" height="40" fill="#7F1D1D"/>

  <!-- Four bold Doric columns -->
  <rect x="84"  y="252" width="52" height="166" fill="#7F1D1D"/>
  <rect x="184" y="252" width="52" height="166" fill="#7F1D1D"/>
  <rect x="284" y="252" width="52" height="166" fill="#7F1D1D"/>
  <rect x="384" y="252" width="52" height="166" fill="#7F1D1D"/>

  <!-- Stepped stylobate (base) -->
  <rect x="56" y="418" width="400" height="20" fill="#7F1D1D"/>
  <rect x="40" y="438" width="432" height="22" fill="#7F1D1D"/>
</svg>
