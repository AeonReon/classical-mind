<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF6D9"/>
      <stop offset="100%" stop-color="#FAF6EC"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.55" r="0.5">
      <stop offset="0%" stop-color="#FFD64A"/>
      <stop offset="55%" stop-color="#FF9F3D"/>
      <stop offset="100%" stop-color="#FF5E8E"/>
    </radialGradient>
    <linearGradient id="marble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8D9B0"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(124,45,18,0)"/>
      <stop offset="50%" stop-color="rgba(124,45,18,0.18)"/>
      <stop offset="100%" stop-color="rgba(124,45,18,0)"/>
    </linearGradient>
  </defs>

  <!-- Cream background, rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Coral sun rising behind the temple -->
  <circle cx="256" cy="430" r="200" fill="url(#sun)" opacity="0.92"/>

  <!-- Stylobate (3-step base) -->
  <rect x="36" y="400" width="440" height="18" fill="url(#marble)"/>
  <rect x="46" y="418" width="420" height="18" fill="url(#marble)" opacity="0.97"/>
  <rect x="56" y="436" width="400" height="22" fill="url(#marble)" opacity="0.93"/>

  <!-- 6 Doric columns with shafts -->
  <g fill="url(#marble)">
    <rect x="78"  y="200" width="44" height="200"/>
    <rect x="148" y="200" width="44" height="200"/>
    <rect x="218" y="200" width="44" height="200"/>
    <rect x="288" y="200" width="44" height="200"/>
    <rect x="358" y="200" width="44" height="200"/>
    <rect x="428" y="200" width="44" height="200"/>
  </g>

  <!-- Doric capitals (simple square abacus) -->
  <g fill="url(#marble)">
    <rect x="72"  y="188" width="56" height="14"/>
    <rect x="142" y="188" width="56" height="14"/>
    <rect x="212" y="188" width="56" height="14"/>
    <rect x="282" y="188" width="56" height="14"/>
    <rect x="352" y="188" width="56" height="14"/>
    <rect x="422" y="188" width="56" height="14"/>
  </g>

  <!-- Fluting (3 vertical lines per column) -->
  <g stroke="#C9B984" stroke-width="1.4" opacity="0.55">
    <line x1="89"  y1="204" x2="89"  y2="398"/>
    <line x1="100" y1="204" x2="100" y2="398"/>
    <line x1="111" y1="204" x2="111" y2="398"/>
    <line x1="159" y1="204" x2="159" y2="398"/>
    <line x1="170" y1="204" x2="170" y2="398"/>
    <line x1="181" y1="204" x2="181" y2="398"/>
    <line x1="229" y1="204" x2="229" y2="398"/>
    <line x1="240" y1="204" x2="240" y2="398"/>
    <line x1="251" y1="204" x2="251" y2="398"/>
    <line x1="299" y1="204" x2="299" y2="398"/>
    <line x1="310" y1="204" x2="310" y2="398"/>
    <line x1="321" y1="204" x2="321" y2="398"/>
    <line x1="369" y1="204" x2="369" y2="398"/>
    <line x1="380" y1="204" x2="380" y2="398"/>
    <line x1="391" y1="204" x2="391" y2="398"/>
    <line x1="439" y1="204" x2="439" y2="398"/>
    <line x1="450" y1="204" x2="450" y2="398"/>
    <line x1="461" y1="204" x2="461" y2="398"/>
  </g>

  <!-- Entablature (architrave + frieze) -->
  <rect x="46" y="156" width="420" height="32" fill="url(#marble)"/>
  <line x1="46" y1="172" x2="466" y2="172" stroke="#C9B984" stroke-width="1" opacity="0.5"/>

  <!-- Triangular pediment -->
  <polygon points="256,52 46,156 466,156" fill="url(#marble)"/>
  <polygon points="256,52 46,156 466,156" fill="none" stroke="#C9B984" stroke-width="1.5" opacity="0.4"/>

  <!-- Tiny acroterion (decorative point) at peak -->
  <circle cx="256" cy="48" r="6" fill="url(#marble)"/>

  <!-- Subtle ground shadow under columns -->
  <ellipse cx="256" cy="464" rx="220" ry="6" fill="url(#shadow)"/>
</svg>
